<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор послуг — Євген</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .calc-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .result { margin-top: 25px; padding: 20px; background: #ff6700; color: white; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #1a2a6c; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Розрахунок вартості</h2>
    
    <label>Кількість товарів:</label>
    <input type="number" id="count" value="10" min="1" oninput="calculate()">

    <label>Тип послуги:</label>
    <select id="serviceType" onchange="calculate()">
        <option value="50">Базове наповнення (50 грн/шт)</option>
        <option value="80">SEO-оптимізація + ШІ (80 грн/шт)</option>
        <option value="120">Повний цикл (SEO, Фото, Опис) (120 грн/шт)</option>
    </select>

    <div class="result" id="totalPrice">Разом: 500 грн</div>
    
    <a href="main.html" class="back-link">← Повернутися до портфоліо</a>
</div>

<script>
    function calculate() {
        // Отримуємо значення з полів
        const count = document.getElementById('count').value;
        const pricePerUnit = document.getElementById('serviceType').value;
        
        // Логіка розрахунку (проста математика)
        let total = count * pricePerUnit;

        // Додамо невелику знижку, якщо товарів більше 100 (це вже справжнє програмування!)
        if (count >= 100) {
            total = total * 0.9; // 10% знижки
            document.getElementById('totalPrice').style.background = '#27ae60'; // Колір стає зеленим
        } else {
            document.getElementById('totalPrice').style.background = '#ff6700'; // Повертаємо помаранчевий
        }

        // Виводимо результат
        document.getElementById('totalPrice').innerText = 'Разом: ' + total + ' грн';
    }
</script>

</body>
</html>
